<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Myself</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 30px;
    }

    .photo img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid #ccc;
      margin-bottom: 30px;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 60%;
    }

    td {
      border: 1px solid #ccc;
      padding: 14px 20px;
      font-size: 15px;
    }

    td:first-child {
      font-weight: bold;
      background-color: #f0f0f0;
      width: 40%;
    }
  </style>
</head>
<body>

  <h1>MYSELF</h1>

  <div class="photo">
    <!-- 把 "photo.jpg" 换成你的照片文件名 -->
    <img src="dog.JPG" alt="My Photo" />
  </div>

  <table>
    <tr><td>Name</td><td>Clayton</td></tr>
    <tr><td>Age</td><td>21</td></tr>
    <tr><td>From</td><td>JB</td></tr>
    <tr><td>Hobby</td><td>Gaming</td></tr>
    <tr><td>Email</td><td>clayton.lim2005@gmail.com</td></tr>
    <tr><td>Quote</td><td>QUALITY</td></tr>
  </table>

</body>
</html>
